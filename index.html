<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Dashboard TV</title>
    <style>
        :root { --bg: #0a0a0b; --card: #141416; --text: #e2e2e5; --up: #00ff88; --down: #ff3e3e; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-left: 5px solid #444; }
        .card h2 { margin: 0; font-size: 1.2rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .price { font-size: 3rem; font-weight: 800; margin: 15px 0; font-variant-numeric: tabular-nums; }
        .change { font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .up { border-left-color: var(--up); } .up .change { color: var(--up); }
        .down { border-left-color: var(--down); } .down .change { color: var(--down); }
        #status { font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 1.5rem; color: #5d3fd3;">WEALTH MONITOR</h1>
        <div id="status">Sincronizando...</div>
    </header>

    <div class="grid" id="app">
        </div>

    <script>
        const TOKEN = 'm3ZQCGwa6Nc5SLrvKUBn2v';
        // Adicione ou remova ativos aqui (Ex: PETR4, VALE3, BTC-USD, IVVB11)
        const TICKERS = ['^BVSP', 'USDBRL', 'BTC-USD', 'IVVB11', 'IFIX', 'PETR4', 'VALE3'];

        async function updateMarket() {
            try {
                const response = await fetch(`https://brapi.dev/api/quote/${TICKERS.join(',')}?token=${TOKEN}`);
                const data = await response.json();
                
                const container = document.getElementById('app');
                container.innerHTML = '';

                data.results.forEach(asset => {
                    const isUp = asset.regularMarketChangePercent >= 0;
                    const card = document.createElement('div');
                    card.className = `card ${isUp ? 'up' : 'down'}`;
                    
                    card.innerHTML = `
                        <h2>${asset.symbol.replace('.SA', '')}</h2>
                        <div class="price">${asset.currency === 'USD' ? '$' : 'R$'} ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                        <div class="change">
                            ${isUp ? '▲' : '▼'} ${Math.abs(asset.regularMarketChangePercent).toFixed(2)}%
                        </div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('status').innerText = `LIVE • Última atualização: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                document.getElementById('status').innerText = 'Erro na conexão. Tentando novamente...';
            }
        }

        // Atualização automática a cada 2 minutos para poupar o processamento da TV
        setInterval(updateMarket, 120000);
        updateMarket();
    </script>
</body>
</html>
