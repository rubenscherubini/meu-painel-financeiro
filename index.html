<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Monitor - Rubens Cherubini Alves</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #5d3fd3; --text: #e0e0e0; --border: #222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .ticker-wrap { height: 40px; background: #000; border-bottom: 1px solid var(--border); flex-shrink: 0; }

        nav { display: flex; background: #0f0f0f; border-bottom: 1px solid var(--border); padding: 10px 20px 0; gap: 8px; flex-shrink: 0; }
        .tab-button { background: #1a1a1a; border: 1px solid var(--border); border-bottom: none; color: #888; padding: 8px 16px; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .tab-button.active { background: var(--accent); color: white; border-color: var(--accent); }

        .tab-content { display: none; flex-grow: 1; flex-direction: column; padding: 10px 15px; overflow: hidden; }
        .tab-content.active { display: flex; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 8px; flex-shrink: 0; }
        #live-clock { font-size: 0.8rem; color: var(--accent); font-weight: bold; font-family: monospace; }

        .grid-cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 8px; 
            margin-bottom: 10px; 
            flex-shrink: 0; 
        }
        
        .card-widget { 
            background: var(--card); 
            border-radius: 6px; 
            overflow: hidden; 
            border: 1px solid var(--border);
            height: 82px; 
        }

        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; flex-grow: 1; min-height: 0; }
        .chart-box { background: var(--card); border-radius: 6px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
        .chart-header { background: #18181b; padding: 4px 10px; font-size: 0.7rem; color: var(--accent); font-weight: bold; }
        .chart-wrapper { flex-grow: 1; }

        .widget-wrapper { flex-grow: 1; border: 1px solid #222; border-radius: 8px; overflow: hidden; background: #131722; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
                    {"proName": "BINANCE:BTCUSDT", "title": "Bitcoin"},
                    {"proName": "BMFBOVESPA:IBOV", "title": "Ibovespa"},
                    {"proName": "FX_IDC:USDBRL", "title": "USD/BRL"}
                ],
                "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "br"
            }
            </script>
        </div>
    </div>

    <nav>
        <button class="tab-button active" onclick="openTab(event, 'tab1')">Wealth Monitor</button>
        <button class="tab-button" onclick="openTab(event, 'tab2')">Carteira B3</button>
    </nav>

    <div id="tab1" class="tab-content active">
        <header>
            <div style="font-size: 0.7rem; font-weight: bold; color: var(--accent);">MONITOR GLOBAL</div>
            <div id="live-clock">--:--:--</div>
        </header>
        
        <div class="grid-cards">
            <div class="card-widget" id="c1"></div> <div class="card-widget" id="c2"></div> <div class="card-widget" id="c3"></div> <div class="card-widget" id="c4"></div> <div class="card-widget" id="c5"></div> <div class="card-widget" id="c6"></div> <div class="card-widget" id="c7"></div> </div>

        <div class="grid-charts">
            <div class="chart-box"><div class="chart-header">IBOV</div><div id="tv_chart_1" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header">SPY</div><div id="tv_chart_2" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header">BTC/USD</div><div id="tv_chart_3" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header">IAU (Ouro)</div><div id="tv_chart_4" class="chart-wrapper"></div></div>
        </div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="widget-wrapper" id="b3-container"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function openTab(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(tb => tb.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        function createCard(id, symbol) {
            const container = document.getElementById(id);
            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
            script.async = true;
            script.text = JSON.stringify({
                "symbol": symbol,
                "width": "100%",
                "colorTheme": "dark",
                "isTransparent": true,
                "locale": "br"
            });
            container.appendChild(script);
        }

        window.onload = () => {
            // Tickers revisados para máxima compatibilidade
            createCard("c1", "FX_IDC:USDBRL");
            createCard("c2", "BMFBOVESPA:IBOV");
            createCard("c3", "AMEX:EWZ");      // Corrigido para AMEX
            createCard("c4", "BMFBOVESPA:IVVB11");
            createCard("c5", "AMEX:SPY");      // Corrigido para AMEX
            createCard("c6", "BINANCE:BTCUSDT");
            createCard("c7", "BMFBOVESPA:GOLD11");

            const config = (s) => ({ "autosize": true, "symbol": s, "interval": "D", "theme": "dark", "style": "1", "locale": "br", "hide_top_toolbar": true });
            new TradingView.widget({...config("BMFBOVESPA:IBOV"), "container_id": "tv_chart_1"});
            new TradingView.widget({...config("AMEX:SPY"), "container_id": "tv_chart_2"});
            new TradingView.widget({...config("BINANCE:BTCUSDT"), "container_id": "tv_chart_3"});
            new TradingView.widget({...config("AMEX:IAU"), "container_id": "tv_chart_4"});

            // Aba 2
            const b3Container = document.getElementById('b3-container');
            const b3Script = document.createElement('script');
            b3Script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
            b3Script.async = true;
            b3Script.text = JSON.stringify({
                "width": "100%", "height": "100%",
                "symbolsGroups": [{ 
                    "name": "Radar B3", 
                    "symbols": [
                        {"name": "BMFBOVESPA:ENEV3"},
                        {"name": "BMFBOVESPA:GGPS3"},
                        {"name": "BMFBOVESPA:ALUP11"},
                        {"name": "BMFBOVESPA:EQTL3"},
                        {"name": "BMFBOVESPA:RENT3"}
                    ] 
                }],
                "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "locale": "br"
            });
            b3Container.appendChild(b3Script);
        };
    </script>
</body>
</html>
