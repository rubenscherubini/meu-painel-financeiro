<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Monitor - Multi-Currency Terminal</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #5d3fd3; --up: #00ff88; --down: #ff3e3e; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; outline: none; width: 150px; }
        button { background: var(--accent); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; border-left: 5px solid #333; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .remove-btn { position: absolute; top: 8px; right: 12px; color: #444; cursor: pointer; font-weight: bold; }
        .symbol { font-size: 0.9rem; color: #888; font-weight: 700; text-transform: uppercase; }
        .price { font-size: 2.1rem; font-weight: 800; margin: 8px 0; color: #fff; letter-spacing: -1px; }
        .up { border-left-color: var(--up); } .up .change { color: var(--up); }
        .down { border-left-color: var(--down); } .down .change { color: var(--down); }
        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 50vh; }
        .chart-box { background: var(--card); border-radius: 12px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
        .chart-header { background: #18181b; padding: 12px 20px; font-weight: bold; font-size: 1rem; color: var(--accent); border-bottom: 1px solid #222; }
        .chart-wrapper { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <h1>WEALTH MONITOR</h1>
            <input type="text" id="tickerInput" placeholder="Ex: VOO, AAPL, VALE3">
            <button onclick="addTicker()">ADICIONAR</button>
            <button onclick="resetTickers()" style="background:#333">RESET</button>
        </div>
        <div id="status" style="font-size: 0.8rem; color: #555;">SINCRONIZADO</div>
    </header>

    <div class="grid-cards" id="painel"></div>

    <div class="grid-charts">
        <div class="chart-box"><div class="chart-header">IBOVESPA (B3)</div><div id="tv_ibov" class="chart-wrapper"></div></div>
        <div class="chart-box"><div class="chart-header">S&P 500 (US)</div><div id="tv_sp500" class="chart-wrapper"></div></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const TOKEN = 'm3ZQCGwa6Nc5SLrvKUBn2v';
        // Lista inicial com os seus ativos preferidos
        let myTickers = JSON.parse(localStorage.getItem('myTickers')) || ['BRL=X', 'EWZ', 'IVVB11', 'GOLD11', 'BTC-USD', 'VOO'];

        function createChart(container, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "D", "timezone": "America/Sao_Paulo",
                "theme": "dark", "style": "1", "locale": "br", "hide_top_toolbar": true, "container_id": container
            });
        }

        createChart("tv_ibov", "BMFBOVESPA:IBOV");
        createChart("tv_sp500", "AMEX:SPY");

        async function fetchAsset(ticker) {
            try {
                await new Promise(r => setTimeout(r, 450));
                const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${TOKEN}`);
                const data = await response.json();
                return data.results[0];
            } catch (e) { return null; }
        }

        async function updateMarket() {
            const painelEl = document.getElementById('painel');
            const results = await Promise.all(myTickers.map(t => fetchAsset(t)));
            painelEl.innerHTML = '';

            results.forEach((asset, index) => {
                if (!asset) return;
                
                const isUp = asset.regularMarketChangePercent >= 0;
                
                // LÓGICA DE MOEDA INTELIGENTE
                // Verificamos a moeda retornada pela API ou forçamos para tickers conhecidos
                let currencyPrefix = 'R$';
                if (asset.currency === 'USD' || asset.symbol === 'BTC-USD' || asset.symbol === 'EWZ' || asset.symbol === 'VOO') {
                    currencyPrefix = 'US$';
                }

                const card = document.createElement('div');
                card.className = `card ${isUp ? 'up' : 'down'}`;
                card.innerHTML = `
                    <div class="remove-btn" onclick="removeTicker('${myTickers[index]}')">✖</div>
                    <div class="symbol">${asset.symbol}</div>
                    <div class="price">${currencyPrefix} ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                    <div class="change">${isUp ? '▲' : '▼'} ${Math.abs(asset.regularMarketChangePercent).toFixed(2)}%</div>
                `;
                painelEl.appendChild(card);
            });
            document.getElementById('status').innerText = `LIVE • ${new Date().toLocaleTimeString('pt-BR')}`;
        }

        function addTicker() {
            const input = document.getElementById('tickerInput');
            const newTicker = input.value.toUpperCase().trim();
            if (newTicker && !myTickers.includes(newTicker)) {
                myTickers.push(newTicker);
                saveAndRefresh();
                input.value = '';
            }
        }

        function removeTicker(ticker) {
            myTickers = myTickers.filter(t => t !== ticker);
            saveAndRefresh();
        }

        function resetTickers() {
            localStorage.removeItem('myTickers');
            location.reload();
        }

        function saveAndRefresh() {
            localStorage.setItem('myTickers', JSON.stringify(myTickers));
            updateMarket();
        }

        updateMarket();
        setInterval(updateMarket, 120000);
    </script>
</body>
</html>
