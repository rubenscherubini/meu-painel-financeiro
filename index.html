<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Monitor - Interactive Terminal</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #5d3fd3; --up: #00ff88; --down: #ff3e3e; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; box-sizing: border-box; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; flex-shrink: 0; }
        .controls { display: flex; gap: 8px; align-items: center; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 6px; border-radius: 4px; outline: none; width: 120px; font-size: 0.8rem; }
        button { background: var(--accent); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
        .card { background: var(--card); border-radius: 8px; padding: 12px; border-left: 4px solid #333; position: relative; }
        .remove-btn { position: absolute; top: 4px; right: 8px; color: #444; cursor: pointer; font-size: 0.7rem; }
        .symbol { font-size: 0.75rem; color: #888; font-weight: 700; text-transform: uppercase; }
        .price { font-size: 1.6rem; font-weight: 800; margin: 4px 0; color: #fff; }
        .up { border-left-color: var(--up); } .up .change { color: var(--up); }
        .down { border-left-color: var(--down); } .down .change { color: var(--down); }

        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        .chart-box { background: var(--card); border-radius: 8px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
        .chart-header { background: #18181b; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .chart-header span { font-weight: bold; font-size: 0.8rem; color: var(--accent); }
        .chart-wrapper { flex-grow: 1; width: 100%; }

        footer { text-align: center; padding: 8px 0; font-size: 0.75rem; color: #444; border-top: 1px solid #222; margin-top: 5px; flex-shrink: 0; }
        footer a { color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <h1 style="margin:0; font-size: 1rem; color: var(--accent);">WEALTH MONITOR</h1>
            <input type="text" id="tickerInput" placeholder="Add Card (ex: PETR4)">
            <button onclick="addTicker()">+</button>
            <button onclick="resetTickers()" style="background:#333">RESET</button>
        </div>
        <div id="status" style="font-size: 0.7rem; color: #444;">LIVE</div>
    </header>

    <div class="grid-cards" id="painel"></div>

    <div class="grid-charts">
        <div class="chart-box">
            <div class="chart-header">
                <span>GRÁFICO 1</span>
                <input type="text" id="inputChart1" placeholder="Mudar Ativo..." onchange="changeChart(1, this.value)">
            </div>
            <div id="tv_chart_1" class="chart-wrapper"></div>
        </div>
        <div class="chart-box">
            <div class="chart-header">
                <span>GRÁFICO 2</span>
                <input type="text" id="inputChart2" placeholder="Mudar Ativo..." onchange="changeChart(2, this.value)">
            </div>
            <div id="tv_chart_2" class="chart-wrapper"></div>
        </div>
    </div>

    <footer>
        Criado por Rubens Cherubini Alves | <a href="https://www.instagram.com/acoes.inteligentes/" target="_blank">@acoes.inteligentes</a>
    </footer>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const TOKEN = 'm3ZQCGwa6Nc5SLrvKUBn2v';
        let myTickers = JSON.parse(localStorage.getItem('myTickers')) || ['BRL=X', 'EWZ', 'IVVB11', 'GOLD11', 'BTC-USD', 'VOO'];

        // Função para carregar Gráfico
        function loadChart(container, symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol.includes(':') ? symbol : `BMFBOVESPA:${symbol}`,
                "interval": "D",
                "timezone": "America/Sao_Paulo",
                "theme": "dark",
                "style": "1",
                "locale": "br",
                "hide_top_toolbar": true,
                "container_id": container
            });
        }

        // Função para mudar o ativo do gráfico
        function changeChart(id, value) {
            const ticker = value.toUpperCase().trim();
            if (ticker) {
                loadChart(`tv_chart_${id}`, ticker);
            }
        }

        // Inicialização
        loadChart("tv_chart_1", "BMFBOVESPA:IBOV");
        loadChart("tv_chart_2", "AMEX:SPY");

        async function fetchAsset(ticker) {
            try {
                await new Promise(r => setTimeout(r, 450));
                const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${TOKEN}`);
                const data = await response.json();
                return data.results[0];
            } catch (e) { return null; }
        }

        async function updateMarket() {
            const painelEl = document.getElementById('painel');
            const results = await Promise.all(myTickers.map(t => fetchAsset(t)));
            painelEl.innerHTML = '';
            results.forEach((asset, index) => {
                if (!asset) return;
                const isUp = asset.regularMarketChangePercent >= 0;
                let currency = (asset.currency === 'USD' || asset.symbol === 'EWZ' || asset.symbol === 'BTC-USD' || asset.symbol === 'VOO') ? 'US$' : 'R$';
                const card = document.createElement('div');
                card.className = `card ${isUp ? 'up' : 'down'}`;
                card.innerHTML = `<div class="remove-btn" onclick="removeTicker('${myTickers[index]}')">✖</div><div class="symbol">${asset.symbol}</div><div class="price">${currency} ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><div class="change">${isUp ? '▲' : '▼'} ${Math.abs(asset.regularMarketChangePercent).toFixed(2)}%</div>`;
                painelEl.appendChild(card);
            });
        }

        function addTicker() {
            const input = document.getElementById('tickerInput');
            const newTicker = input.value.toUpperCase().trim();
            if (newTicker && !myTickers.includes(newTicker)) {
                myTickers.push(newTicker);
                saveAndRefresh();
                input.value = '';
            }
        }

        function removeTicker(ticker) {
            myTickers = myTickers.filter(t => t !== ticker);
            saveAndRefresh();
        }

        function resetTickers() { localStorage.removeItem('myTickers'); location.reload(); }
        function saveAndRefresh() { localStorage.setItem('myTickers', JSON.stringify(myTickers)); updateMarket(); }

        updateMarket();
        setInterval(updateMarket, 120000);
    </script>
</body>
</html>
