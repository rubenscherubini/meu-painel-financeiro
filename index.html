<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Monitor - B3</title>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #111; border-radius: 12px; padding: 25px; border-left: 6px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .symbol { font-size: 1.1rem; color: #888; text-transform: uppercase; }
        .price { font-size: 3.2rem; font-weight: bold; margin: 15px 0; }
        .change { font-size: 1.6rem; font-weight: 600; }
        .up { border-left-color: #00ff88; } .up .change { color: #00ff88; }
        .down { border-left-color: #ff3e3e; } .down .change { color: #ff3e3e; }
        #status { font-size: 0.9rem; color: #444; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 1.6rem; color: #5d3fd3;">WEALTH MONITOR</h1>
        <div id="status">Iniciando sistema...</div>
    </header>

    <div class="grid" id="painel">
        </div>

    <script>
        const TOKEN = 'm3ZQCGwa6Nc5SLrvKUBn2v';
        // Adicionei ativos focados em dividendos e proteção (Dólar/FIIs)
        const TICKERS = ['^BVSP', 'PETR4', 'VALE3', 'IFIX', 'USDBRL', 'IVVB11'];

        async function updateMarket() {
            const statusEl = document.getElementById('status');
            const painelEl = document.getElementById('painel');

            try {
                statusEl.innerText = 'Sincronizando com B3...';
                
                // Chamada para a API Brapi
                const response = await fetch(`https://brapi.dev/api/quote/${TICKERS.join(',')}?token=${TOKEN}`);
                
                if (!response.ok) {
                    throw new Error(`Erro API: ${response.status}`);
                }

                const data = await response.json();

                if (!data.results || data.results.length === 0) {
                    throw new Error('Nenhum dado retornado da Brapi.');
                }

                painelEl.innerHTML = ''; // Limpa o painel para novos dados

                data.results.forEach(asset => {
                    const isUp = asset.regularMarketChangePercent >= 0;
                    const card = document.createElement('div');
                    card.className = `card ${isUp ? 'up' : 'down'}`;
                    
                    // Formatação de moeda dinâmica
                    const symbolPrefix = asset.currency === 'USD' ? '$' : 'R$';
                    const price = asset.regularMarketPrice ? asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '---';
                    const variation = asset.regularMarketChangePercent ? asset.regularMarketChangePercent.toFixed(2) : '0.00';

                    card.innerHTML = `
                        <div class="symbol">${asset.symbol.replace('.SA', '')}</div>
                        <div class="price">${symbolPrefix} ${price}</div>
                        <div class="change">${isUp ? '▲' : '▼'} ${Math.abs(variation)}%</div>
                    `;
                    painelEl.appendChild(card);
                });

                statusEl.innerText = `ON-LINE • ${new Date().toLocaleTimeString()}`;

            } catch (err) {
                console.error(err);
                statusEl.innerText = `ERRO: ${err.message}`;
                // Se o painel estiver vazio, avisa o usuário
                if(painelEl.innerHTML === 'Iniciando sistema...') {
                    painelEl.innerHTML = '<p style="color: #666;">Falha ao carregar ativos. Verifique se o Token está ativo no painel da Brapi.</p>';
                }
            }
        }

        // Atualiza a cada 2 minutos (para não sobrecarregar a TV e o limite da API)
        setInterval(updateMarket, 120000);
        updateMarket();
    </script>
</body>
</html>
