<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Monitor - Rubens Cherubini Alves</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #5d3fd3; --text: #e0e0e0; --border: #222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .ticker-wrap { height: 40px; background: #000; border-bottom: 1px solid var(--border); flex-shrink: 0; }

        nav { display: flex; background: #0f0f0f; border-bottom: 1px solid var(--border); padding: 10px 20px 0; gap: 8px; flex-shrink: 0; }
        .tab-button { background: #1a1a1a; border: 1px solid var(--border); border-bottom: none; color: #888; padding: 8px 16px; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .tab-button.active { background: var(--accent); color: white; border-color: var(--accent); }

        .tab-content { display: none; flex-grow: 1; flex-direction: column; padding: 10px 15px; overflow: hidden; }
        .tab-content.active { display: flex; }

        #tab2 { overflow-y: auto; }
        .tables-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 25px; 
            justify-content: center; 
            padding: 20px 0 50px;
        }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .controls { display: flex; gap: 8px; align-items: center; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 4px 8px; border-radius: 4px; outline: none; width: 110px; font-size: 0.7rem; }
        button { background: var(--accent); border: none; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        
        #live-clock { font-size: 0.8rem; color: var(--accent); font-weight: bold; font-family: monospace; }

        .grid-cards { display: flex; gap: 8px; margin-bottom: 10px; flex-shrink: 0; overflow-x: auto; padding-bottom: 5px; }
        .card-widget { min-width: 160px; background: var(--card); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); height: 82px; }

        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; flex-grow: 1; min-height: 0; }
        .chart-box { background: var(--card); border-radius: 6px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
        .chart-header { background: #18181b; padding: 4px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .chart-header span { font-size: 0.65rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .chart-header input { width: 70px; height: 18px; font-size: 0.6rem; background: #000; }
        .chart-wrapper { flex-grow: 1; }

        /* Largura aumentada para 800px conforme solicitado */
        .widget-wrapper-b3 { 
            width: 100%;
            max-width: 800px; 
            height: 550px; 
            border: 1px solid #222; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #131722; 
        }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "VANTAGE:SP500", "title": "S&P 500"},
                    {"proName": "BINANCE:BTCUSDT", "title": "Bitcoin"},
                    {"proName": "BMFBOVESPA:IBOV", "title": "Ibovespa"},
                    {"proName": "FX_IDC:USDBRL", "title": "USD/BRL"}
                ],
                "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "br"
            }
            </script>
        </div>
    </div>

    <nav>
        <button class="tab-button active" onclick="openTab(event, 'tab1')">Wealth Monitor</button>
        <button class="tab-button" onclick="openTab(event, 'tab2')">Carteira B3</button>
    </nav>

    <div id="tab1" class="tab-content active">
        <header>
            <div class="controls">
                <input type="text" id="inputCard" placeholder="Add Card">
                <button onclick="addCard()">+</button>
                <button onclick="resetCards()" style="background:#333">RESET</button>
            </div>
            <div id="live-clock">--:--:--</div>
        </header>
        <div class="grid-cards" id="container-cards"></div>
        <div class="grid-charts">
            <div class="chart-box"><div class="chart-header"><span id="title_1">IBOV</span><input type="text" placeholder="..." onchange="updateChart(1, this.value)"></div><div id="tv_chart_1" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header"><span id="title_2">S&P 500 (Vantage)</span><input type="text" placeholder="..." onchange="updateChart(2, this.value)"></div><div id="tv_chart_2" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header"><span id="title_3">BTC/USD</span><input type="text" placeholder="..." onchange="updateChart(3, this.value)"></div><div id="tv_chart_3" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header"><span id="title_4">IAU (GOLD)</span><input type="text" placeholder="..." onchange="updateChart(4, this.value)"></div><div id="tv_chart_4" class="chart-wrapper"></div></div>
        </div>
    </div>

    <div id="tab2" class="tab-content">
        <header>
            <div class="controls">
                <span style="font-size: 0.8rem; color: var(--accent); font-weight: bold;">CARTEIRA B3: AÇÕES & FIIs</span>
                <button onclick="location.reload()" style="background:#333">RECARREGAR</button>
            </div>
        </header>
        <div class="tables-container">
            <div class="widget-wrapper-b3" id="container-acoes"></div>
            <div class="widget-wrapper-b3" id="container-fiis"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let cardsList = JSON.parse(localStorage.getItem('cardsList')) || ["FX_IDC:USDBRL", "BMFBOVESPA:IBOV", "AMEX:EWZ", "BMFBOVESPA:IVVB11", "AMEX:SPY", "BINANCE:BTCUSDT", "BMFBOVESPA:GOLD11"];
        
        const listaAcoes = ["BMFBOVESPA:ENEV3", "BMFBOVESPA:GGPS3", "BMFBOVESPA:EQTL3", "BMFBOVESPA:ALUP11", "BMFBOVESPA:RENT3", "BMFBOVESPA:RENT4", "BMFBOVESPA:RDOR3", "BMFBOVESPA:IGTI11"];
        const listaFiis = ["BMFBOVESPA:KFOF11", "BMFBOVESPA:HGBS11", "BMFBOVESPA:KDOF11", "BMFBOVESPA:HLOG11", "BMFBOVESPA:CJCT11", "BMFBOVESPA:PPEI11", "BMFBOVESPA:HRDF11", "BMFBOVESPA:SEED11", "BMFBOVESPA:BDIV11", "BMFBOVESPA:KNHY11", "BMFBOVESPA:RPRI11", "BMFBOVESPA:CDHY16"];

        function openTab(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(tb => tb.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        function updateChart(id, ticker) {
            ticker = ticker.toUpperCase().trim();
            if (!ticker) return;
            let f = (ticker.length <= 6 && !ticker.includes(':')) ? `BMFBOVESPA:${ticker}` : ticker;
            document.getElementById(`title_${id}`).innerText = ticker;
            document.getElementById(`tv_chart_${id}`).innerHTML = ''; 
            new TradingView.widget({ "autosize": true, "symbol": f, "interval": "D", "theme": "dark", "style": "1", "locale": "br", "hide_top_toolbar": true, "container_id": `tv_chart_${id}` });
        }

        function renderCards() {
            const container = document.getElementById('container-cards');
            container.innerHTML = '';
            cardsList.forEach((symbol) => {
                const div = document.createElement('div');
                div.className = 'card-widget';
                container.appendChild(div);
                const script = document.createElement('script');
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
                script.async = true;
                script.text = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "br" });
                div.appendChild(script);
            });
        }

        function renderTable(containerId, title, list) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
            script.async = true;
            script.text = JSON.stringify({
                "width": "100%", "height": "100%",
                "symbolsGroups": [{ "name": title, "symbols": list.map(s => ({"name": s})) }],
                "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "locale": "br"
            });
            container.appendChild(script);
        }

        window.onload = () => {
            renderCards();
            renderTable("container-acoes", "AÇÕES", listaAcoes);
            renderTable("container-fiis", "FIIs / OUTROS", listaFiis);
            updateChart(1, "BMFBOVESPA:IBOV");
            updateChart(2, "VANTAGE:SP500");
            updateChart(3, "BINANCE:BTCUSDT");
            updateChart(4, "AMEX:IAU");
        };
    </script>
</body>
</html>
