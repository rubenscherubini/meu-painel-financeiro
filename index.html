<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wealth Monitor - B3</title>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 30px; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; border-radius: 12px; padding: 25px; border-left: 6px solid #333; }
        .symbol { font-size: 1.1rem; color: #888; }
        .price { font-size: 2.8rem; font-weight: bold; margin: 10px 0; }
        .up { border-left-color: #00ff88; color: #00ff88; }
        .down { border-left-color: #ff3e3e; color: #ff3e3e; }
        .price-white { color: #e0e0e0; }
        #status { font-size: 0.9rem; color: #444; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 1.5rem; color: #5d3fd3;">WEALTH MONITOR</h1>
        <div id="status">Verificando ativos...</div>
    </header>

    <div class="grid" id="painel"></div>

    <script>
        const TOKEN = 'm3ZQCGwa6Nc5SLrvKUBn2v';
        // Tickers com o formato exato que a Brapi costuma aceitar
        const TICKERS = ['PETR4', 'VALE3', 'IVVB11', 'ITUB4', 'BTC-USD'];

        async function updateMarket() {
            const painelEl = document.getElementById('painel');
            const statusEl = document.getElementById('status');
            
            // Tentamos buscar todos de uma vez, mas com tratamento de erro
            try {
                const response = await fetch(`https://brapi.dev/api/quote/${TICKERS.join(',')}?token=${TOKEN}`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.message || 'Erro 400');

                painelEl.innerHTML = '';
                data.results.forEach(asset => {
                    const isUp = asset.regularMarketChangePercent >= 0;
                    const card = document.createElement('div');
                    card.className = `card ${isUp ? 'up' : 'down'}`;
                    
                    card.innerHTML = `
                        <div class="symbol">${asset.symbol}</div>
                        <div class="price price-white">R$ ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                        <div class="change">${isUp ? '▲' : '▼'} ${asset.regularMarketChangePercent.toFixed(2)}%</div>
                    `;
                    painelEl.appendChild(card);
                });

                statusEl.innerText = `ON-LINE • ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                statusEl.innerText = `ERRO: ${err.message}`;
                console.error(err);
            }
        }

        updateMarket();
        setInterval(updateMarket, 60000);
    </script>
</body>
</html>
