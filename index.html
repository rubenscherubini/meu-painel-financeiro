<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wealth Monitor - B3 & Gráficos</title>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: #111; border-radius: 10px; padding: 15px; border-left: 4px solid #333; }
        .symbol { font-size: 0.9rem; color: #888; font-weight: bold; }
        .price { font-size: 1.8rem; font-weight: bold; margin: 5px 0; color: #fff; }
        .up { border-left-color: #00ff88; } .up .change { color: #00ff88; }
        .down { border-left-color: #ff3e3e; } .down .change { color: #ff3e3e; }
        .change { font-size: 1.1rem; font-weight: 600; }
        #status { font-size: 0.8rem; color: #555; }
        
        /* Container do Gráfico */
        .chart-container { height: 450px; background: #111; border-radius: 12px; padding: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 1.3rem; color: #5d3fd3;">WEALTH MONITOR</h1>
        <div id="status">Sincronizando...</div>
    </header>

    <div class="grid" id="painel"></div>

    <div class="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_ibov" style="height:calc(100% - 32px);width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.MediumWidget({
                "symbols": [ ["BMFBOVESPA:IBOV|1D"] ],
                "chartOnly": false,
                "width": "100%",
                "height": "100%",
                "locale": "br",
                "colorTheme": "dark",
                "autosize": true,
                "showVolume": false,
                "hideDateRanges": false,
                "scalePosition": "right",
                "scaleMode": "Normal",
                "fontFamily": "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
                "noOverlays": false,
                "container_id": "tradingview_ibov"
            });
            </script>
        </div>
        </div>

    <script>
        const TOKEN = 'm3ZQCGwa6Nc5SLrvKUBn2v';
        const TICKERS = ['PETR4', 'VALE3', 'IVVB11', 'ITUB4', 'BTC-USD'];

        async function fetchSingleAsset(ticker) {
            try {
                const response = await fetch(`https://brapi.dev/api/quote/${ticker}?token=${TOKEN}`);
                const data = await response.json();
                return data.results[0];
            } catch (e) { return null; }
        }

        async function updateMarket() {
            const painelEl = document.getElementById('painel');
            const statusEl = document.getElementById('status');
            
            const promises = TICKERS.map(ticker => fetchSingleAsset(ticker));
            const results = await Promise.all(promises);

            painelEl.innerHTML = '';

            results.forEach(asset => {
                if (!asset) return;
                const isUp = asset.regularMarketChangePercent >= 0;
                const card = document.createElement('div');
                card.className = `card ${isUp ? 'up' : 'down'}`;
                card.innerHTML = `
                    <div class="symbol">${asset.symbol}</div>
                    <div class="price">R$ ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                    <div class="change">${isUp ? '▲' : '▼'} ${asset.regularMarketChangePercent.toFixed(2)}%</div>
                `;
                painelEl.appendChild(card);
            });
            statusEl.innerText = `LIVE • ${new Date().toLocaleTimeString()}`;
        }

        updateMarket();
        setInterval(updateMarket, 120000);
    </script>
</body>
</html>
