<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Monitor - Rubens Cherubini Alves</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #5d3fd3; --text: #e0e0e0; --border: #222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .ticker-wrap { height: 40px; background: #000; border-bottom: 1px solid var(--border); flex-shrink: 0; }

        nav { display: flex; background: #0f0f0f; border-bottom: 1px solid var(--border); padding: 10px 20px 0; gap: 8px; flex-shrink: 0; }
        .tab-button { background: #1a1a1a; border: 1px solid var(--border); border-bottom: none; color: #888; padding: 8px 16px; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .tab-button.active { background: var(--accent); color: white; border-color: var(--accent); }

        .tab-content { display: none; flex-grow: 1; flex-direction: column; padding: 10px 15px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .controls { display: flex; gap: 8px; align-items: center; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 4px 8px; border-radius: 4px; outline: none; width: 110px; font-size: 0.7rem; }
        button { background: var(--accent); border: none; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        
        #live-clock { font-size: 0.8rem; color: var(--accent); font-weight: bold; font-family: monospace; }

        .grid-indices { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 20px; padding-bottom: 40px; }
        .widget-index-box { height: 450px; border: 1px solid #222; border-radius: 8px; overflow: hidden; background: #131722; }
        
        .grid-cards { display: flex; gap: 8px; margin-bottom: 10px; flex-shrink: 0; overflow-x: auto; padding-bottom: 5px; }
        .card-widget { min-width: 160px; background: var(--card); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); height: 82px; }

        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; flex-grow: 1; min-height: 0; }
        .chart-box { background: var(--card); border-radius: 6px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
        .chart-header { background: #18181b; padding: 4px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .chart-header span { font-size: 0.65rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .chart-wrapper { flex-grow: 1; }

        .widget-wrapper-b3 { width: 100%; height: 550px; border: 1px solid #222; border-radius: 8px; overflow: hidden; background: #131722; }
        .tables-container { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; padding: 10px 0 50px; }
        .table-section { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 800px; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "VANTAGE:SP500", "title": "S&P 500"},{"proName": "BMFBOVESPA:IBOV", "title": "Ibovespa"},
                    {"proName": "FX_IDC:USDBRL", "title": "USD/BRL"},{"proName": "FX_IDC:EURBRL", "title": "EUR/BRL"},
                    {"proName": "BINANCE:BTCBRL", "title": "BTC/BRL"},{"proName": "BINANCE:BTCUSDT", "title": "BTC/USD"}
                ],
                "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "br"
            }
            </script>
        </div>
    </div>

    <nav>
        <button class="tab-button active" onclick="openTab(event, 'tab1')">Wealth Monitor</button>
        <button class="tab-button" onclick="openTab(event, 'tab2')">Carteira B3</button>
        <button class="tab-button" onclick="openTab(event, 'tab3')">Índices Mercado</button>
    </nav>

    <div id="tab1" class="tab-content active">
        <header>
            <div class="controls"><input type="text" id="inputCard" placeholder="Add Card"><button onclick="addCard()">+</button><button onclick="resetCards()" style="background:#333">RESET</button></div>
            <div id="live-clock">--:--:--</div>
        </header>
        <div class="grid-cards" id="container-cards"></div>
        <div class="grid-charts">
            <div class="chart-box"><div class="chart-header"><span id="title_1">IBOV</span><input type="text" onchange="updateChart(1, this.value)"></div><div id="tv_chart_1" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header"><span id="title_2">S&P 500</span><input type="text" onchange="updateChart(2, this.value)"></div><div id="tv_chart_2" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header"><span id="title_3">BTC/USD</span><input type="text" onchange="updateChart(3, this.value)"></div><div id="tv_chart_3" class="chart-wrapper"></div></div>
            <div class="chart-box"><div class="chart-header"><span id="title_4">IAU (GOLD)</span><input type="text" onchange="updateChart(4, this.value)"></div><div id="tv_chart_4" class="chart-wrapper"></div></div>
        </div>
    </div>

    <div id="tab2" class="tab-content">
        <header><div class="controls"><span style="font-size:0.8rem; color:var(--accent); font-weight:bold;">AÇÕES & FIIs</span><button onclick="resetTab2()" style="background:#333">RESET DEFAULT</button></div></header>
        <div class="tables-container">
            <div class="table-section">
                <div class="controls"><input type="text" id="inputAcao" placeholder="Adicionar Ação"><button onclick="addToTable('acoes')">+</button></div>
                <div class="widget-wrapper-b3" id="container-acoes"></div>
            </div>
            <div class="table-section">
                <div class="controls"><input type="text" id="inputFii" placeholder="Adicionar FII"><button onclick="addToTable('fiis')">+</button></div>
                <div class="widget-wrapper-b3" id="container-fiis"></div>
            </div>
        </div>
    </div>

    <div id="tab3" class="tab-content">
        <header><span style="font-size:0.8rem; color:var(--accent); font-weight:bold;">MACRO INDICATORS - GLOBAL VIEW</span></header>
        <div class="grid-indices">
            <div class="widget-index-box" id="idx-equity"></div>
            <div class="widget-index-box" id="idx-commos"></div>
            <div class="widget-index-box" id="idx-juros-int"></div>
            <div class="widget-index-box" id="idx-juros-br"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let cardsList = JSON.parse(localStorage.getItem('cardsList')) || ["FX_IDC:USDBRL", "BMFBOVESPA:IBOV", "AMEX:EWZ", "BMFBOVESPA:IVVB11", "AMEX:IVV", "BINANCE:BTCUSDT", "BMFBOVESPA:GOLD11"];
        let listaAcoes = JSON.parse(localStorage.getItem('listaAcoes')) || ["BMFBOVESPA:ENEV3", "BMFBOVESPA:GGPS3", "BMFBOVESPA:EQTL3", "BMFBOVESPA:ALUP11", "BMFBOVESPA:RENT3", "BMFBOVESPA:RENT4", "BMFBOVESPA:RDOR3", "BMFBOVESPA:IGTI11"];
        let listaFiis = JSON.parse(localStorage.getItem('listaFiis')) || ["BMFBOVESPA:KFOF11", "BMFBOVESPA:HGBS11", "BMFBOVESPA:HDOF11", "BMFBOVESPA:HLOG11", "BMFBOVESPA:CJCT11", "BMFBOVESPA:PPEI11", "BMFBOVESPA:HRDF11", "BMFBOVESPA:SEED11", "BMFBOVESPA:BDIV11", "BMFBOVESPA:KNHY11", "BMFBOVESPA:RPRI11", "BMFBOVESPA:CDHY16"];

        const listEquity = [
            {"name": "IBOV", "description": "Ibovespa"},
            {"name": "SMAL11", "description": "Small Caps BR"},
            {"name": "EWZ", "description": "Brasil (EWZ)"},
            {"name": "ACWI", "description": "Global (ACWI)"},
            {"name": "SPY", "description": "S&P 500 (SPY)"},
            {"name": "QQQ", "description": "Nasdaq 100 (QQQ)"},
            {"name": "IWM", "description": "Russell 2000 (IWM)"},
            {"name": "EEM", "description": "Emerging Markets"},
            {"name": "VIX", "description": "VIX Index"}
        ];
        
        const listCommos = [
            {"name": "DBC", "description": "Commodity Index"},
            {"name": "GLD", "description": "Ouro (ETF)"},
            {"name": "SLV", "description": "Prata (ETF)"},
            {"name": "USO", "description": "Petróleo WTI"},
            {"name": "BTCUSD", "description": "Bitcoin"}
        ];

        // Usando Tickers Puros (O widget resolve a exchange automaticamente)
        const listJurosInt = [
            {"name": "BIL", "description": "T-Bill < 1Y"},
            {"name": "SHY", "description": "Treasury 1-3Y"},
            {"name": "IEF", "description": "Treasury 7-10Y"},
            {"name": "TLT", "description": "Treasury 20Y+"},
            {"name": "TIP", "description": "Inflação/Real"},
            {"name": "LQD", "description": "Investment Grade"},
            {"name": "HYG", "description": "High Yield"},
            {"name": "DXY", "description": "Dólar Index"}
        ];

        const listJurosBr = [
            {"name": "DI1F2025", "description": "DI 2025"},
            {"name": "DI1F2027", "description": "DI 2027"},
            {"name": "DI1F2029", "description": "DI 2029"},
            {"name": "DI1F2031", "description": "DI 2031"},
            {"name": "B5P211", "description": "B5P2 (IMA-B Curto)"},
            {"name": "IMAB11", "description": "IMAB11 (IMA-B)"},
            {"name": "B5MB11", "description": "B5MB (IMA-B Longo)"}
        ];

        function openTab(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(tb => tb.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function renderIndexTable(containerId, title, list) {
            const container = document.getElementById(containerId);
            if(!container) return; container.innerHTML = '';
            const script = document.createElement('script'); script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
            script.async = true;
            const symbols = list.map(item => ({"name": item.name, "displayName": item.description}));
            script.text = JSON.stringify({ "width": "100%", "height": "100%", "symbolsGroups": [{ "name": title, "symbols": symbols }], "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "locale": "br" });
            container.appendChild(script);
        }

        function updateChart(id, ticker) {
            ticker = ticker.toUpperCase().trim(); if (!ticker) return;
            let f = (ticker.length <= 6 && !ticker.includes(':')) ? `BMFBOVESPA:${ticker}` : ticker;
            document.getElementById(`tv_chart_${id}`).innerHTML = ''; 
            new TradingView.widget({ "autosize": true, "symbol": f, "interval": "D", "theme": "dark", "style": "1", "locale": "br", "hide_top_toolbar": true, "container_id": `tv_chart_${id}` });
        }

        function renderCards() {
            const container = document.getElementById('container-cards'); container.innerHTML = '';
            cardsList.forEach((symbol) => {
                const div = document.createElement('div'); div.className = 'card-widget'; container.appendChild(div);
                const script = document.createElement('script'); script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
                script.async = true; script.text = JSON.stringify({ "symbol": symbol, "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "br" });
                div.appendChild(script);
            });
        }

        function addCard() {
            const val = document.getElementById('inputCard').value.toUpperCase().trim();
            if (val) {
                const f = (val.length <= 6 && !val.includes(':')) ? `BMFBOVESPA:${val}` : val;
                cardsList.push(f); localStorage.setItem('cardsList', JSON.stringify(cardsList)); renderCards();
                document.getElementById('inputCard').value = '';
            }
        }

        function resetCards() { localStorage.removeItem('cardsList'); location.reload(); }
        function resetTab2() { localStorage.removeItem('listaAcoes'); localStorage.removeItem('listaFiis'); location.reload(); }
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        window.onload = () => {
            renderCards();
            renderIndexTable("container-acoes", "AÇÕES", listaAcoes.map(s => ({"name": s, "description": s.replace("BMFBOVESPA:", "")})));
            renderIndexTable("container-fiis", "FIIs", listaFiis.map(s => ({"name": s, "description": s.replace("BMFBOVESPA:", "")})));
            renderIndexTable("idx-equity", "EQUITY", listEquity);
            renderIndexTable("idx-commos", "COMMODITIES", listCommos);
            renderIndexTable("idx-juros-int", "JUROS INTERNACIONAL", listJurosInt);
            renderIndexTable("idx-juros-br", "JUROS BRASIL", listJurosBr);
            updateChart(1, "BMFBOVESPA:IBOV"); updateChart(2, "VANTAGE:SP500"); updateChart(3, "BINANCE:BTCUSDT"); updateChart(4, "AMEX:IAU");
        };
    </script>
</body>
</html>
