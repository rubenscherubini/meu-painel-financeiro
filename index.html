<script>
    const TOKEN = 'm3ZQCGwa6Nc5SLrvKUBn2v';
    // Usei nomes mais simples que a Brapi aceita melhor
    const TICKERS = ['IBOV', 'PETR4', 'VALE3', 'IVVB11', 'BTC'];

    async function updateMarket() {
        try {
            const response = await fetch(`https://brapi.dev/api/quote/${TICKERS.join(',')}?token=${TOKEN}`);
            
            if (!response.ok) throw new Error('Falha na API');

            const data = await response.json();
            const container = document.getElementById('app');
            container.innerHTML = '';

            if(!data.results) throw new Error('Sem resultados');

            data.results.forEach(asset => {
                const isUp = asset.regularMarketChangePercent >= 0;
                const card = document.createElement('div');
                card.className = `card ${isUp ? 'up' : 'down'}`;
                
                card.innerHTML = `
                    <h2>${asset.symbol}</h2>
                    <div class="price">R$ ${asset.regularMarketPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                    <div class="change">
                        ${isUp ? '▲' : '▼'} ${Math.abs(asset.regularMarketChangePercent || 0).toFixed(2)}%
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('status').innerText = `LIVE • Atualizado: ${new Date().toLocaleTimeString()}`;
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = 'Erro: Verifique o Token ou Conexão';
        }
    }

    setInterval(updateMarket, 60000);
    updateMarket();
</script>
